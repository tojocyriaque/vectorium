<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Animator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d1a;
            --surface: #13132b;
            --border: rgba(139, 92, 246, 0.2);
            --accent: #8b5cf6;
            --accent2: #3b82f6;
            --accent3: #10b981;
            --text: #e2e2f0;
            --muted: #5a5a7a;
            --radius: 10px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 28px 16px 60px;
        }

        /* ─── Header ─── */
        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header .eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        header h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(22px, 5vw, 40px);
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.15;
            letter-spacing: -1px;
        }

        header p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
        }

        /* ─── Input Panel ─── */
        .input-panel {
            max-width: 660px;
            margin: 0 auto 28px;
        }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 15px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            outline: none;
            line-height: 1.55;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0 14px;
        }

        .chip {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 20px;
            padding: 4px 11px;
            color: #60a5fa;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .chip:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        #generate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Space Mono', monospace;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        #generate-btn:hover:not(:disabled) {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #generate-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .error-box {
            margin-top: 10px;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 12px;
            display: none;
        }

        /* ─── Animation Panel ─── */
        #anim-panel {
            max-width: 660px;
            margin: 0 auto;
            display: none;
        }

        .anim-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        #anim-title {
            font-family: 'Space Mono', monospace;
            font-size: 15px;
            color: #a78bfa;
            font-weight: 700;
        }

        #anim-duration {
            font-size: 10px;
            color: var(--muted);
        }

        .canvas-wrap {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: 100%;
            display: block;
        }

        .explanation-box {
            margin-top: 10px;
            min-height: 44px;
            padding: 10px 14px;
            background: rgba(59, 130, 246, 0.07);
            border: 1px solid rgba(59, 130, 246, 0.18);
            border-radius: 8px;
            font-size: 12px;
            color: #93c5fd;
            line-height: 1.55;
            font-family: 'Inter', sans-serif;
        }

        .explanation-box .dot {
            color: #4ade80;
            margin-right: 7px;
        }

        /* ─── Scrubber ─── */
        .scrubber-wrap {
            margin-top: 14px;
            position: relative;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
            height: 4px;
        }

        .marker-row {
            position: relative;
            height: 18px;
            margin-top: 3px;
        }

        .marker {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            top: 5px;
            transform: translateX(-50%);
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }

        .marker:hover {
            opacity: 1;
            transform: translateX(-50%) scale(1.4);
        }

        .scrubber-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            margin-top: 2px;
        }

        /* ─── Controls ─── */
        .controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 13px;
        }

        .ctrl-btn {
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .ctrl-btn:hover {
            opacity: 0.85;
        }

        .ctrl-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .ctrl-primary {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            font-weight: 700;
            min-width: 110px;
        }

        /* ─── Physics Summary ─── */
        .physics-summary {
            margin-top: 16px;
            padding: 12px 15px;
            background: rgba(16, 185, 129, 0.07);
            border: 1px solid rgba(16, 185, 129, 0.18);
            border-radius: 8px;
            font-size: 11.5px;
            color: #6ee7b7;
            line-height: 1.65;
        }

        .physics-summary .label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--accent3);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* ─── Loading ─── */
        .loading-overlay {
            text-align: center;
            padding: 40px 0;
            display: none;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 12px;
            margin-top: 48px;
        }
    </style>
</head>

<body>

    <header>
        <div class="eyebrow">Physics Visualizer</div>
        <h1>Describe any physical event</h1>
        <p>AI generates a scrollable interactive animation with explanations</p>
    </header>

    <div class="input-panel">
        <textarea id="desc" rows="3"
            placeholder="e.g. A ball rolls off a table and falls to the ground, bouncing twice before stopping..."></textarea>

        <div class="examples" id="examples"></div>

        <button id="generate-btn" onclick="generate()">▶ Generate Animation</button>
        <div class="error-box" id="error-box"></div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div style="font-family:'Space Mono',monospace;font-size:12px;color:#8888aa;">
            Generating animation…
        </div>
    </div>

    <div id="anim-panel">
        <div class="anim-header">
            <span id="anim-title"></span>
            <span id="anim-duration"></span>
        </div>
        <div class="canvas-wrap">
            <canvas id="canvas" width="600" height="400"></canvas>
        </div>
        <div class="explanation-box" id="explanation">
            <span class="dot">●</span><span id="explanation-text">—</span>
        </div>
        <div class="scrubber-wrap">
            <input type="range" id="scrubber" min="0" max="10" step="0.01" value="0">
            <div class="marker-row" id="markers"></div>
            <div class="scrubber-labels">
                <span>0s</span><span id="scrubber-end">10s</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn ctrl-secondary" onclick="resetAnim()">⏮ Reset</button>
            <button class="ctrl-btn ctrl-primary" id="play-btn" onclick="togglePlay()">▶ Play</button>
            <button class="ctrl-btn ctrl-secondary" onclick="goToEnd()">⏭ End</button>
        </div>
        <div class="physics-summary" id="summary">
            <div class="label">Physics Summary</div>
            <span id="summary-text"></span>
        </div>
    </div>

    <div class="empty-state" id="empty-state">
        Describe an event above and hit Generate
    </div>

    <script>
        // ─── Config ───────────────────────────────────────────────
        const API_URL = "http://localhost:8000/generate";

        const EXAMPLES = [
            "A ball rolls off a table and falls to the ground, bouncing twice",
            "Two billiard balls collide head-on at different speeds",
            "A pendulum swings back and forth, gradually losing energy",
            "A rocket launches upward, burning fuel and accelerating",
        ];

        // ─── State ────────────────────────────────────────────────
        let animData = null;
        let currentT = 0;
        let playing = false;
        let lastTimestamp = null;
        let rafId = null;

        // ─── DOM refs ─────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scrubber = document.getElementById('scrubber');
        const playBtn = document.getElementById('play-btn');

        // ─── Populate example chips ───────────────────────────────
        EXAMPLES.forEach(ex => {
            const btn = document.createElement('button');
            btn.className = 'chip';
            btn.textContent = ex.length > 45 ? ex.slice(0, 42) + '…' : ex;
            btn.onclick = () => document.getElementById('desc').value = ex;
            document.getElementById('examples').appendChild(btn);
        });

        // ─── Generate ─────────────────────────────────────────────
        async function generate() {
            const desc = document.getElementById('desc').value.trim();
            if (!desc) return;

            stopAnim();
            setLoading(true);
            hideError();
            document.getElementById('anim-panel').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ description: desc })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `Server error ${res.status}`);
                }

                animData = await res.json();
                currentT = 0;
                initPlayer();

            } catch (e) {
                showError(e.message.includes('Failed to fetch')
                    ? 'Cannot reach backend. Is the FastAPI server running on port 8000?'
                    : e.message);
                document.getElementById('empty-state').style.display = 'block';
            } finally {
                setLoading(false);
            }
        }

        // ─── Player init ──────────────────────────────────────────
        function initPlayer() {
            document.getElementById('anim-title').textContent = animData.title;
            document.getElementById('anim-duration').textContent = `Duration: ${animData.duration}s`;
            document.getElementById('summary-text').textContent = animData.physics_summary;
            scrubber.max = animData.duration;
            scrubber.value = 0;
            document.getElementById('scrubber-end').textContent = animData.duration + 's';

            // Build explanation markers
            const markerRow = document.getElementById('markers');
            markerRow.innerHTML = '';
            (animData.explanations || []).forEach(ex => {
                const m = document.createElement('div');
                m.className = 'marker';
                m.style.left = `${(ex.t / animData.duration) * 100}%`;
                m.title = ex.text;
                m.onclick = () => { stopAnim(); seek(ex.t); };
                markerRow.appendChild(m);
            });

            document.getElementById('anim-panel').style.display = 'block';
            drawFrame(0);
            updateExplanation(0);
        }

        // ─── Play / Pause ─────────────────────────────────────────
        function togglePlay() {
            if (currentT >= animData.duration) { currentT = 0; }
            playing ? stopAnim() : startAnim();
        }

        function startAnim() {
            playing = true;
            lastTimestamp = null;
            playBtn.textContent = '⏸ Pause';
            rafId = requestAnimationFrame(loop);
        }

        function stopAnim() {
            playing = false;
            playBtn.textContent = '▶ Play';
            if (rafId) cancelAnimationFrame(rafId);
            rafId = null;
        }

        function loop(ts) {
            if (!playing) return;
            if (lastTimestamp === null) lastTimestamp = ts;
            const delta = (ts - lastTimestamp) / 1000;
            lastTimestamp = ts;
            currentT = Math.min(currentT + delta, animData.duration);
            seek(currentT, false);
            if (currentT >= animData.duration) { stopAnim(); return; }
            rafId = requestAnimationFrame(loop);
        }

        function resetAnim() { stopAnim(); seek(0); }
        function goToEnd() { stopAnim(); seek(animData.duration); }

        function seek(t, updateScrubberEl = true) {
            currentT = t;
            if (updateScrubberEl) scrubber.value = t;
            drawFrame(t);
            updateExplanation(t);
        }

        scrubber.addEventListener('input', () => { stopAnim(); seek(parseFloat(scrubber.value)); });

        // ─── Keyframe interpolation ───────────────────────────────
        function lerp(a, b, t) { return a + (b - a) * t; }

        function easeInOut(t) {
            return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function getProp(keyframes, t, prop) {
            const defaults = { opacity: 1, scaleX: 1, scaleY: 1, rotation: 0 };
            const def = defaults[prop] ?? 0;
            if (!keyframes || keyframes.length === 0) return def;
            const kf = [...keyframes].sort((a, b) => a.t - b.t);
            if (t <= kf[0].t) return kf[0][prop] ?? def;
            if (t >= kf[kf.length - 1].t) return kf[kf.length - 1][prop] ?? def;
            for (let i = 0; i < kf.length - 1; i++) {
                if (t >= kf[i].t && t <= kf[i + 1].t) {
                    const alpha = (t - kf[i].t) / (kf[i + 1].t - kf[i].t);
                    const va = kf[i][prop] ?? def;
                    const vb = kf[i + 1][prop] ?? def;
                    return lerp(va, vb, easeInOut(alpha));
                }
            }
            return def;
        }

        // ─── Draw ─────────────────────────────────────────────────
        function drawFrame(t) {
            const W = canvas.width, H = canvas.height;
            ctx.clearRect(0, 0, W, H);

            // Background
            ctx.fillStyle = animData.background || '#e8f0f8';
            ctx.fillRect(0, 0, W, H);

            // Subtle grid
            ctx.strokeStyle = 'rgba(0,0,0,0.045)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
            for (let y = 0; y <= H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

            // Objects
            animData.objects.forEach(obj => drawObject(obj, t));

            // Time stamp
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.font = '11px "Space Mono", monospace';
            ctx.textAlign = 'right';
            ctx.fillText(`t = ${t.toFixed(2)}s`, W - 10, H - 8);
        }

        function drawObject(obj, t) {
            const x = getProp(obj.keyframes, t, 'x');
            const y = getProp(obj.keyframes, t, 'y');
            const rot = getProp(obj.keyframes, t, 'rotation') * Math.PI / 180;
            const op = getProp(obj.keyframes, t, 'opacity');
            const sx = getProp(obj.keyframes, t, 'scaleX');
            const sy = getProp(obj.keyframes, t, 'scaleY');
            const w = obj.width || 30;
            const h = obj.height || 30;

            ctx.save();
            ctx.globalAlpha = op;
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.scale(sx, sy);

            ctx.fillStyle = obj.color || '#4a90d9';
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.5;

            if (obj.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, w / 2, 0, Math.PI * 2);
                ctx.fill(); ctx.stroke();
                ctx.beginPath();
                ctx.arc(-w * 0.14, -h * 0.14, w * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();

            } else if (obj.shape === 'rect') {
                ctx.beginPath();
                ctx.roundRect(-w / 2, -h / 2, w, h, 3);
                ctx.fill(); ctx.stroke();

            } else if (obj.shape === 'triangle') {
                ctx.beginPath();
                ctx.moveTo(0, -h / 2);
                ctx.lineTo(w / 2, h / 2);
                ctx.lineTo(-w / 2, h / 2);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

            } else if (obj.shape === 'line') {
                ctx.beginPath();
                ctx.moveTo(-w / 2, 0);
                ctx.lineTo(w / 2, 0);
                ctx.strokeStyle = obj.color || '#333';
                ctx.lineWidth = h || 4;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // Label
            if (obj.label && obj.shape !== 'line') {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.font = 'bold 10px "Space Mono", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(obj.label, 0, h / 2 + 14);
            }

            ctx.restore();
        }

        // ─── Explanations ─────────────────────────────────────────
        function updateExplanation(t) {
            const exps = (animData?.explanations || []).slice().sort((a, b) => a.t - b.t);
            let best = exps[0];
            for (const e of exps) { if (e.t <= t) best = e; }
            document.getElementById('explanation-text').textContent = best ? best.text : '—';
        }

        // ─── UI helpers ───────────────────────────────────────────
        function setLoading(on) {
            document.getElementById('loading').style.display = on ? 'block' : 'none';
            document.getElementById('generate-btn').disabled = on;
            document.getElementById('generate-btn').textContent = on ? '⚙ Generating…' : '▶ Generate Animation';
        }
        function showError(msg) {
            const el = document.getElementById('error-box');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('error-box').style.display = 'none';
        }

        // Ctrl+Enter shortcut
        document.getElementById('desc').addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
        });
    </script>
</body>

</html>
